name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            ext: msi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            ext: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            ext: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x64
            ext: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            ext: deb
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            ext: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CamForge-Next v__VERSION__'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          tauriScript: pnpm tauri

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $ext = "${{ matrix.ext }}"
          $arch = "${{ matrix.arch }}"

          if ($ext -eq "msi") {
            $file = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" | Select-Object -First 1
            $newName = "CamForge-Next_${version}_windows_${arch}.msi"
          } else {
            $file = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
            $newName = "CamForge-Next_${version}_windows_${arch}.exe"
          }

          Copy-Item $file.FullName -Destination $newName
          echo "ARTIFACT_PATH=$newName" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Prepare artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          ext="${{ matrix.ext }}"
          arch="${{ matrix.arch }}"

          if [ "$ext" = "dmg" ]; then
            file=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
            newName="CamForge-Next_${version}_macos_${arch}.dmg"
            cp "$file" "$newName"
            echo "ARTIFACT_PATH=$newName" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          ext="${{ matrix.ext }}"
          arch="${{ matrix.arch }}"

          if [ "$ext" = "deb" ]; then
            file=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb | head -1)
            newName="CamForge-Next_${version}_linux_${arch}.deb"
            cp "$file" "$newName"
          else
            file=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage | head -1)
            newName="CamForge-Next_${version}_linux_${arch}.AppImage"
            cp "$file" "$newName"
          fi

          echo "ARTIFACT_PATH=$newName" >> $GITHUB_ENV
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CamForge-Next_${{ steps.get_version.outputs.VERSION }}_${{ matrix.os == 'windows-latest' && 'windows' || matrix.os == 'macos-latest' && 'macos' || 'linux' }}_${{ matrix.arch }}_${{ matrix.ext }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CamForge-Next v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## CamForge-Next v${{ steps.get_version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |:--------:|:------------:|:-----|
            | Windows | x64 | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_windows_x64.msi` |
            | Windows | x64 | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_windows_x64.exe` (NSIS installer) |
            | macOS | arm64 (Apple Silicon) | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_macos_arm64.dmg` |
            | macOS | x64 (Intel) | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_macos_x64.dmg` |
            | Linux | x64 | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_linux_x64.deb` |
            | Linux | x64 | `CamForge-Next_${{ steps.get_version.outputs.VERSION }}_linux_x64.AppImage` |

            ### What's Changed

            See [CHANGELOG.md](./CHANGELOG.md) for details.
          draft: true
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}